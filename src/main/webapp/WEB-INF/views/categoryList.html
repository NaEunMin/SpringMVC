<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록 - Category Management</title>
    <style>
        body {
            font-family: 'Malgun Gothic', Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        h1 {
            border-bottom: 2px solid #4a90d9;
            padding-bottom: 10px;
            color: #2c3e50;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #4a90d9;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .btn:hover {
            background: #357abd;
        }

        .btn-gray {
            background: #6c757d;
            float: right;
        }

        .btn-gray:hover {
            background: #545b62;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #4a90d9;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }

        tr:hover {
            background: #f5f8ff;
        }

        /* 에러, 성공 메시지 스타일 */
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .alert-danger {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.95em;
            padding: 0;
            text-decoration: underline;
        }

        .btn-delete:hover {
            color: #c0392b;
        }

        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>카테고리 목록</h1>

    <!-- 1. 이후에 만들어질 예외 처리 및 FlashAttribute 메시지를 위한 공간 -->
    <div class="alert-success" th:if="${successMessage}">
        <span th:text="${successMessage}"></span>
    </div>
    <div class="alert-danger" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- 2. 나중에 구현할 카테고리 생성 폼을 위한 버튼 -->
    <a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>

    <a class="btn btn-gray" th:href="@{/products}">상품 목록으로 돌아가기</a>

    <div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
        등록된 카테고리가 없습니다.
    </div>

    <table th:unless="${#lists.isEmpty(categories)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">카테고리명</td>
                <td>
                    <!-- 3. 요구사항에 명시된 삭제 기능을 위한 POST 폼을 미리 마련 -->
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post"
                        style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까? 연결된 상품이 있으면 오류가 발생할 수 있습니다.');">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <footer class="footer">
        <p
            th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss', 'ko') + ' | 학번: 2171250 | 성명: 나은민'}">
        </p>
    </footer>

</body>

</html>
